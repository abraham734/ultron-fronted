<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultrón - Asistente de Trading</title>

  <!-- === ESTILOS === -->
  <link rel="stylesheet" href="/css/ultron.css" />
  <link rel="stylesheet" href="/css/analisis.css" />
  <link rel="stylesheet" href="/css/watchlist.css" />
  <link rel="stylesheet" href="/css/configuracionrapida.css" />
  <link rel="stylesheet" href="/css/historial.css" />
  <link rel="stylesheet" href="/css/switches.css" />
</head>

<body>
  <!-- === LAYOUT COMPLETO DE ULTRÓN === -->
  <div class="layout-ultron">
    <!-- === SIDEBAR === -->
    <aside class="sidebar">
      <div class="sidebar-header simple">
        <div class="ultron-title">Ultrón</div>
        <img src="/assets/ultron-logo.png" alt="Ultrón Logo" class="ultron-logo" />
      </div>

     
      <div class="sidebar-footer">
        <p><strong>Sistema Activo</strong><br />Monitoreando 24 horas</p>
      </div>
    </aside>

    <!-- === CONTENIDO PRINCIPAL === -->
    <main class="main-content">
      <header class="main-header">
        <h2>Análisis Estratégico en Tiempo Real</h2>

        <!-- Selector de Intervalos -->
        <select id="selector-intervalo" class="selector-intervalo">
          <option value="10m">10m</option>
          <option value="30m">30m</option>
          <option value="1h" selected>1h</option>
          <option value="4h">4h</option>
        </select>

        <div id="indicador-vivo" class="indicador-vivo">
          <span class="punto-verde"></span> ULTRÓN OPERATIVO
        </div>
      </header>

      <!-- Barra de estrategias -->
      <nav id="barra-estrategias"></nav>

      <!-- Estado de escaneo -->
      <div class="barra-escaneo">
        <span id="estado-escaneo">🔍 Esperando análisis...</span>
      </div>

      <!-- Contenedor principal del análisis -->
      <section id="contenedor-activos" class="contenedor-activos"></section>

      <!-- Historial de Entradas v5.0 -->
      <section id="historial-panel" class="historial-panel">

        <h3 class="titulo-historial">📘 Historial de Entradas</h3>

        <!-- Métricas -->
        <div class="hist-metricas-grid">
          <div class="hist-metrica-card">
            <span class="hist-metrica-label">Total señales</span>
            <span class="hist-metrica-valor" id="hm-total">—</span>
          </div>
          <div class="hist-metrica-card">
            <span class="hist-metrica-label">Win rate</span>
            <span class="hist-metrica-valor" id="hm-winrate">—</span>
          </div>
          <div class="hist-metrica-card">
            <span class="hist-metrica-label">R:R promedio</span>
            <span class="hist-metrica-valor" id="hm-rr">—</span>
          </div>
          <div class="hist-metrica-card">
            <span class="hist-metrica-label">P&amp;L neto</span>
            <span class="hist-metrica-valor" id="hm-pnl">—</span>
          </div>
        </div>

        <!-- Filtros -->
        <div class="historial-filtros">

          <div class="filtro-bloque">
            <label>Semana:</label>
            <select id="selector-semana"></select>
          </div>

          <div class="filtro-bloque">
            <label>Mes:</label>
            <select id="selector-mes"></select>
          </div>

          <div class="filtro-bloque">
            <label>Activo:</label>
            <select id="selector-activo"></select>
          </div>

          <div class="filtro-bloque">
            <label>Desde:</label>
            <input type="date" id="fecha-desde">
          </div>

          <div class="filtro-bloque">
            <label>Hasta:</label>
            <input type="date" id="fecha-hasta">
          </div>

          <button id="btn-filtrar-rango" class="btn-filtrar">Filtrar</button>
          <button id="btn-semana-actual" class="btn-sem-actual">Semana Actual</button>

        </div>

        <!-- Tabla -->
        <div class="tabla-contenedor">
          <table class="tabla-historial">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Activo</th>
                <th>Estrategia</th>
                <th>Bias</th>
                <th>Entry</th>
                <th>SL</th>
                <th>TP1</th>
                <th>TP2</th>
                <th>TP3</th>
                <th>Resultado</th>
                <th>R:R</th>
                <th>Riesgo</th>
              </tr>
            </thead>
            <tbody id="tabla-historial-body"></tbody>
          </table>
        </div>

      </section>
    </main>

    <!-- === PANEL DE WATCHLIST === -->
    <aside class="watchlist-panel"></aside>
  </div>

  <!-- === SCRIPTS === -->
  <script type="module" src="/js/ultron.js"></script>
  <script type="module" src="/js/api_twelvedata.js"></script>
  <script type="module" src="/js/configuracionrapida.js"></script>
  <script type="module" src="/js/data.js"></script>
  <script type="module" src="/js/historial.js"></script>
  <script type="module" src="/js/switches.js"></script>
  <script type="module" src="/js/watchlist.js"></script>
  <script type="module" src="/js/keepalive.js"></script>
  <script type="module" src="/js/escaneoentradas.js"></script>
  <script type="module" src="/js/intervalosporactivo.js"></script>

</body>
</html>
